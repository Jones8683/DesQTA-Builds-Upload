name: Upload Windows Build
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
permissions:
  actions: read
  contents: read
jobs:
  check:
    name: Check for New Build
    runs-on: ubuntu-latest
    outputs:
      new_build: ${{ steps.check.outputs.new_build }}
      run_id: ${{ steps.check.outputs.run_id }}
      commit_sha: ${{ steps.check.outputs.commit_sha }}
      commit_msg: ${{ steps.check.outputs.commit_msg }}
      commit_author: ${{ steps.check.outputs.commit_author }}
    steps:
      - name: Compare Latest Run Against Last Uploaded
        id: check
        run: |
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/BetterSEQTA/DesQTA/actions/workflows/build.yml/runs?branch=develop&per_page=10")

          LATEST_RUN=$(echo "$RESPONSE" | jq -r '
            .workflow_runs[] |
            select(.status == "in_progress" or .status == "completed") |
            .id' | head -n 1)

          COMMIT_SHA=$(echo "$RESPONSE" | jq -r '.workflow_runs[0].head_sha')
          COMMIT_MSG=$(echo "$RESPONSE" | jq -r '.workflow_runs[0].head_commit.message' | head -n 1)
          COMMIT_AUTHOR=$(echo "$RESPONSE" | jq -r '.workflow_runs[0].head_commit.author.name')

          ARTIFACTS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/BetterSEQTA/DesQTA/actions/runs/$LATEST_RUN/artifacts")

          WINDOWS_ARTIFACT=$(echo "$ARTIFACTS" | jq -r '.artifacts[] | select(.name == "desktop-builds-windows-latest") | .id')

          LAST_UPLOADED=$(curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/variables/LAST_UPLOADED_RUN_ID" \
            | jq -r '.value // "0"')

          echo "Latest run ID: $LATEST_RUN"
          echo "Last uploaded ID: $LAST_UPLOADED"
          echo "Windows artifact ID: $WINDOWS_ARTIFACT"

          if [ -z "$WINDOWS_ARTIFACT" ]; then
            echo "Windows artifact not available yet, skipping!"
            echo "new_build=false" >> $GITHUB_OUTPUT
          elif [ "$LATEST_RUN" = "$LAST_UPLOADED" ]; then
            echo "No new build, skipping!"
            echo "new_build=false" >> $GITHUB_OUTPUT
          else
            echo "New build found with Windows artifact ready!"
            echo "new_build=true" >> $GITHUB_OUTPUT
            echo "run_id=$LATEST_RUN" >> $GITHUB_OUTPUT
            echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
            echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
            echo "commit_author=$COMMIT_AUTHOR" >> $GITHUB_OUTPUT
          fi

  upload:
    name: Download and Upload to OwnCloud
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.new_build == 'true'
    steps:
      - name: Print Build Info
        run: |
          echo "Commit: ${{ needs.check.outputs.commit_sha }}"
          echo "Message: ${{ needs.check.outputs.commit_msg }}"
          echo "Author: ${{ needs.check.outputs.commit_author }}"

      - name: Download Windows Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-builds-windows-latest
          run-id: ${{ needs.check.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: BetterSEQTA/DesQTA

      - name: Upload Installer to OwnCloud
        run: |
          EXE=$(find nsis -name "*.exe" | head -n 1)
          if [ -z "$EXE" ]; then
            echo "No .exe found!" && exit 1
          fi
          curl -u "${{ secrets.OWNCLOUD_USERNAME }}:${{ secrets.OWNCLOUD_PASSWORD }}" \
            -T "$EXE" \
            "https://files.jonesjankovic.com/remote.php/dav/files/JonesJ/DesQTA-latest-setup.exe"

      - name: Save Uploaded Run ID
        run: |
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"value": "${{ needs.check.outputs.run_id }}"}' \
            "https://api.github.com/repos/${{ github.repository }}/actions/variables/LAST_UPLOADED_RUN_ID"
